<!DOCTYPE html>
<html>

<head>
    <title>Alert HTML</title>
    <meta charset="UTF-8">
    <script type="text/javascript">
        function mostrarAlerta() {
            alert("¡Hola! Esta es una alerta. \nPuedes incluir HTML en esta alerta.");
        }
    </script>
    <link rel="stylesheet" href="alert.css">
</head>
<body>
    <div class="container">
        <h1>Alert HTML</h1>
        <p>This is an alert HTML file.</p>

        <button type="button" onclick="mostrarAlerta()">Mostrar alerta</button>
    </div>
</body>
</html>
