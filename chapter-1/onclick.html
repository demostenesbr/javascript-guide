<!DOCTYPE html>
<html>

<head>
    <title>Onclick HTML</title>
    <meta charset="UTF-8">

</html>

<body>
    <button type="button" onclick="alert('¡Hola! Esta es una alerta. \nPuedes incluir HTML en esta alerta.')">Mostrar
        alerta</button>
    <button type="button" onclick="confirm('¿Quieres continuar? \nPuedes incluir HTML en esta confirmación.')">Mostrar
        confirmación</button>
    <button type="button" onclick="prompt('Olá visitante\nInforme a data do seu nascimento:', 'dd/mm/aaaa')">Mostrar
        prompt</button>
</body>

</html>
