<!DOCTYPE html>
<html>

<head>
    <title>Comment HTML</title>
    <meta charset="UTF-8">
    <script type="text/javascript">
        function showComments() {
            // This is a single-line comment in JavaScript
            alert("This is a comment example in JavaScript."); // Alert box
            confirm("Comments are ignored by the JavaScript engine and do not affect the execution of the code."); // Confirm box
            prompt("You can use comments to explain your code or to temporarily disable code during development.", "Type your comment here..."); // Data box
        }
    </script>
