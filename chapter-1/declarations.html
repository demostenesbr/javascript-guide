<!DOCTYPE html>
<html>

<head>
    <title>Declaration HTML</title>
    <meta charset="UTF-8">
    <script type="text/javascript">
        // Declarations on the same line
        a = 5; b = 8; alert("Olá mundo!");

        // Declarations on different lines
        var x = 10;
        var y = 20;
        alert("A soma de x e y é: " + (x + y));

        // Multiple declarations in a single statement
        a=27; // Código sem espaços entre as declarações
        a = 27; // Código com espaços entre as declarações
        alert("Olá") // Código sem espaços entre as declarações
        alert ("Mundo") // Código com espaços entre as declarações
        function myFunction() {
            alert("Olá! Esta é uma função declarada.");
        }
        function myFunction() {
            alert("Olá! Esta é uma função declarada.");
        }

        // Correct syntax for variable declaration
        document.write("<p>Eu sou \
            uma string</p>"); // Uso de \ para quebrar linha em strings

        // Literal syntax for object declaration
        a = 45; // Declaração de variável sem var, let ou const
        mensage = "Olá, mundo!"; // Declaração de variável sem var, let ou const

        // Existem seis tipos de dados literais conforme descritos a seguir:
        /*
            - Integer (numeric) literal: 42
            - Decimal (numeric) literal: 3.14
            - Boolean literal: true, false
            - String literal: "Hello, world!"
            - Array literal: [1, 2, 3]
            - Object literal: { name: "Alice", age: 30 }
        */

        // Declarações usando literal inteiro (integer)
        c = 42; // Base 10
        d = -119; // Base 10
        e = 0x11086; // Base 16 (hexadecimal)
        f = 0xf56a2; // Base 16 (hexadecimal)

        // Declarações usando literal decimal (decimal)
        g = 3.1416; // Número decimal
        h = -0.001; // Número decimal negativo
        i = 2.5e6; // Notação científica (2.5 x 10^6)
        j = 1.2e-3; // Notação científica (1.2 x 10^-3)

        // Declarações usando literal booleano (boolean)
        k = true; // Valor booleano verdadeiro
        l = false; // Valor booleano falso

        // Declarações usando literal string (string)
        m = "Olá, mundo!"; // String usando aspas duplas
        n = 'JavaScript é incrível!'; // String usando aspas simples
        o = `Template literals permitem expressões embutidas.`; // String usando template literals
    </script>

</html>
